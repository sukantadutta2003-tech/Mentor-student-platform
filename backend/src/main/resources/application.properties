# Spring Boot
spring.application.name=MentorPlatform
server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mentorplatform}
spring.datasource.username=${DB_USERNAME:primus}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:MXBsdWpIa09sOWg3c3ByZm00cjN2NWp3dno4a0xaenJWMVFOQWJQUUxVMD0=}
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
