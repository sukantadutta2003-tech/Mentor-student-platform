# ========================
# Application Config
# ========================
spring.application.name=MentorPlatform
server.port=8080

# ========================
# PostgreSQL Database
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/mentorplatform
spring.datasource.username=primus
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT Configuration
# ========================
jwt.secret=MentorPlatformSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2026
jwt.expiration=86400000

# ========================
# CORS Configuration
# ========================
app.cors.allowed-origins=http://localhost:3000
