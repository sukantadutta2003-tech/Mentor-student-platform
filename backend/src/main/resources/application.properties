# Spring Boot
spring.application.name=MentorPlatform
server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mentorplatform}
spring.datasource.username=${DB_USERNAME:primus}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:mentorplatform}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# JWT
jwt.secret=${JWT_SECRET:MXBsdWpIa09sOWg3c3ByZm00cjN2NWp3dno4a0xaenJWMVFOQWJQUUxVMD0=}
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# === Memory Optimizations (for 256MB deployments) ===

# Lazy bean initialization — beans created on first use, not at startup
spring.main.lazy-initialization=true

# Tomcat thread pool — reduced from default 200 to 20
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=2

# HikariCP connection pool — reduced from default 10 to 3
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# Disable JMX (saves ~10MB)
spring.jmx.enabled=false
